<!DOCTYPE html>
<html lang="it">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BonaEvents Scanner</title>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .box{
            width:100%;
            max-width:500px;
            background:#1a1a1a;
            border-radius:25px;
            padding:30px;
            box-shadow:0px 0px 30px rgba(255,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#ff1e1e;
        }

        .upload-btn{

            display:block;
            width:100%;
            padding:20px;
            margin-top:30px;
            background:#ff1e1e;
            border:none;
            border-radius:15px;
            color:white;
            font-size:20px;
            font-weight:bold;

        }

        input{
            display:none;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>BonaEvents Scanner 🎟️</h1>

        <form
            action="/upload_scan"
            method="POST"
            enctype="multipart/form-data"
        >

            <label class="upload-btn">

                SCANSIONA QR

                <input
                    type="file"
                    name="file"
                    accept="image/*"
                    capture="environment"
                    onchange="this.form.submit()"
                >

            </label>

        </form>

    </div>

</body>
</html>
