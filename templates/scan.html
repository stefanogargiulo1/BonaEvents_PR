<!DOCTYPE html>
<html lang="it">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BonaEvents Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .box{
            width:100%;
            max-width:500px;
            background:#1a1a1a;
            border-radius:25px;
            padding:30px;
            box-shadow:0px 0px 30px rgba(255,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#ff1e1e;
            margin-bottom:10px;
        }

        p{
            color:#999;
            margin-bottom:30px;
        }

        #reader{
            width:100%;
        }

        #result{
            margin-top:25px;
            background:#111;
            padding:20px;
            border-radius:15px;
            font-size:22px;
            font-weight:bold;
        }

        .success{
            color:#00ff88;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>BonaEvents Scanner 🎟️</h1>

        <p>Scannerizza il QR del ticket</p>

        <div id="reader"></div>

        <div id="result">
            In attesa scansione...
        </div>

    </div>

    <script>

        function onScanSuccess(decodedText) {

            navigator.vibrate(200)

            document.getElementById("result").innerHTML = `
                <div class="success">
                    ✅ Ticket Valido<br><br>
                    ${decodedText}
                </div>
            `

        }

        let scanner = new Html5QrcodeScanner(
            "reader",
            {
                fps: 10,
                qrbox: 250,
                rememberLastUsedCamera: true
            }
        )

        scanner.render(onScanSuccess)

    </script>

</body>
</html>
