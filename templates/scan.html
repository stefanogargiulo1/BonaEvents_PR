<!DOCTYPE html>
<html lang="it">
<head>

    <meta charset="UTF-8">

    <title>Scanner QR</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:50px;
        }

        h1{
            color:#00ff88;
        }

        #reader{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:20px;
        }

        #result{
            margin-top:30px;
            font-size:25px;
            font-weight:bold;
        }

    </style>

</head>
<body>

    <h1>Scanner Ticket 🎟️</h1>

    <div id="reader"></div>

    <div id="result"></div>

    <script>

        function onScanSuccess(decodedText){

            document.getElementById("result").innerHTML =
            "✅ Ticket Scansionato:<br>" + decodedText

        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            {
                fps:10,
                qrbox:250
            }
        )

        html5QrcodeScanner.render(onScanSuccess)

    </script>

</body>
</html>
