<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BonaEvents Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        #reader {
            width: 100%;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            white-space: pre-line;
        }

        .waiting {
            background: #334155;
            color: #e2e8f0;
        }

        .success {
            background: #166534;
            color: #dcfce7;
        }

        .error {
            background: #991b1b;
            color: #fee2e2;
        }

        .warning {
            background: #92400e;
            color: #fef3c7;
        }

        button {
            margin-top: 15px;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BonaEvents Scanner 🎟️</h1>
        <p>Scannerizza il QR del ticket</p>

        <div id="reader"></div>
        <div id="result" class="waiting">In attesa scansione...</div>

        <button onclick="restartScanner()">Scansiona un altro ticket</button>
    </div>

    <script>
        let html5QrCode;
        let isProcessing = false;

        function setResult(message, type) {
            const resultBox = document.getElementById("result");
            resultBox.className = "";
            resultBox.classList.add(type);
            resultBox.textContent = message;
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                if (html5QrCode) {
                    await html5QrCode.stop();
                }

                setResult("Controllo ticket in corso...", "waiting");

                const response = await fetch("/validate-ticket", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ticket_code: decodedText
                    })
                });

                const data = await response.json();

                if (data.status === "valid") {
                    setResult(
                        "✅ TICKET VALIDO\n\n" +
                        "Codice: " + data.ticket.ticket_code + "\n" +
                        "Cliente: " + (data.ticket.customer || "-") + "\n" +
                        "Evento: " + data.ticket.event + "\n" +
                        "Validato alle: " + data.ticket.validated_at,
                        "success"
                    );
                } else if (data.status === "already_used") {
                    setResult(
                        "⚠️ TICKET GIÀ UTILIZZATO\n\n" +
                        "Codice: " + data.ticket.ticket_code + "\n" +
                        "Cliente: " + (data.ticket.customer || "-") + "\n" +
                        "Evento: " + data.ticket.event + "\n" +
                        "Già validato alle: " + (data.ticket.validated_at || "-"),
                        "warning"
                    );
                } else {
                    setResult("❌ TICKET NON VALIDO", "error");
                }
            } catch (error) {
                setResult("❌ Errore durante la validazione del ticket", "error");
            }
        }

        function onScanFailure(error) {
        }

        async function startScanner() {
            setResult("In attesa scansione...", "waiting");

            html5QrCode = new Html5Qrcode("reader");

            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess,
                    onScanFailure
                );
            } catch (err) {
                setResult("❌ Impossibile avviare la fotocamera", "error");
            }
        }

        async function restartScanner() {
            isProcessing = false;

            try {
                if (html5QrCode && html5QrCode.isScanning) {
                    await html5QrCode.stop();
                }
            } catch (e) {
            }

            startScanner();
        }

        window.addEventListener("load", function () {
            startScanner();
        });
    </script>
</body>
</html>
