<!DOCTYPE html>
<html lang="it">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BonaEvents Scanner</title>

    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .box{
            width:100%;
            max-width:500px;
            background:#1a1a1a;
            border-radius:25px;
            padding:30px;
            box-shadow:0px 0px 30px rgba(255,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#ff1e1e;
            margin-bottom:10px;
        }

        p{
            color:#999;
            margin-bottom:30px;
        }

        video{
            width:100%;
            border-radius:20px;
            border:3px solid #ff1e1e;
        }

        #result{
            margin-top:25px;
            background:#111;
            padding:20px;
            border-radius:15px;
            font-size:22px;
            font-weight:bold;
        }

        .success{
            color:#00ff88;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>BonaEvents Scanner 🎟️</h1>

        <p>Scannerizza il QR del ticket</p>

        <video id="preview"></video>

        <div id="result">
            In attesa scansione...
        </div>

    </div>

    <script>

        let scanner = new Instascan.Scanner({
            video: document.getElementById('preview'),
            mirror:false
        })

        scanner.addListener('scan', function(content) {

            navigator.vibrate(200)

            document.getElementById("result").innerHTML = `
                <div class="success">
                    ✅ Ticket Valido<br><br>
                    ${content}
                </div>
            `

        })

        Instascan.Camera.getCameras().then(function (cameras) {

            if (cameras.length > 0) {

                scanner.start(cameras[cameras.length - 1])

            } else {

                alert('Nessuna fotocamera trovata')

            }

        }).catch(function (e) {

            console.error(e)

        })

    </script>

</body>
</html>
