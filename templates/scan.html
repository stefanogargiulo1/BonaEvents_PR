<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BonaEvents Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 520px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cbd5e1;
            margin-top: 0;
        }

        #reader {
            width: 100%;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            white-space: pre-line;
        }

        .waiting {
            background: #334155;
            color: #e2e8f0;
        }

        .success {
            background: #166534;
            color: #dcfce7;
        }

        .error {
            background: #991b1b;
            color: #fee2e2;
        }

        .warning {
            background: #92400e;
            color: #fef3c7;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        button, a {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, a:hover {
            background: #2563eb;
        }

        .secondary {
            background: #475569;
        }

        .secondary:hover {
            background: #334155;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BonaEvents Scanner 🎟️</h1>
        <p class="subtitle">Scannerizza il QR del ticket</p>
        <div style="margin-bottom:20px;">

    <h3 style="text-align:left;">Evento</h3>

<select id="eventSelect"
        style="
        width:100%;
        padding:12px;
        border-radius:10px;
        margin-bottom:15px;
">

    <option value="">Seleziona evento</option>

    {% for event_name in events.keys() %}
        <option value="{{ event_name }}">
            {{ event_name }}
        </option>
    {% endfor %}

</select>

<h3 style="text-align:left;">Data</h3>

<select id="dateSelect"
        style="
        width:100%;
        padding:12px;
        border-radius:10px;
        margin-bottom:15px;
">

    <option value="">Seleziona data</option>

</select>

</div>

        <div class="buttons">
            <button id="startBtn" type="button">Avvia scanner</button>
            <button id="restartBtn" type="button" class="secondary">Scansiona un altro ticket</button>
            <a class="secondary" href="{{ url_for('dashboard') }}">Torna dashboard</a>
        </div>

        <div id="reader"></div>
        <div id="result" class="waiting">In attesa scansione...</div>
    </div>

    <audio id="successSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="errorSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg">
    </audio>



    <script>

        const EVENTS_DATA = {{ events | tojson }};

    </script>

    <script>
        let html5QrCode = null;
        let isProcessing = false;
        let scannerStarted = false;

        const successSound = document.getElementById("successSound");
        const errorSound = document.getElementById("errorSound");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");
        const eventSelect = document.getElementById("eventSelect");
        const dateSelect = document.getElementById("dateSelect");

        eventSelect.addEventListener("change", function() {

            dateSelect.innerHTML =
                '<option value="">Seleziona data</option>';

            const selectedEvent = this.value;

            if (!selectedEvent) return;

            const dates = EVENTS_DATA[selectedEvent] || [];

            dates.forEach(d => {

                const option = document.createElement("option");

                option.value = d.date;

                option.textContent =
                    `${d.date} (${d.inventory} disponibili)`;

                dateSelect.appendChild(option);

            });

        });

        function setResult(message, type) {
            const resultBox = document.getElementById("result");
            resultBox.className = "";
            resultBox.classList.add(type);
            resultBox.textContent = message;
        }

        function unlockAudio() {
            [successSound, errorSound].forEach(audio => {
                if (!audio) return;
                audio.volume = 1;
                const p = audio.play();
                if (p !== undefined) {
                    p.then(() => {
                        audio.pause();
                        audio.currentTime = 0;
                    }).catch(() => {});
                }
            });
        }

        function playSuccessSound() {
            if (successSound) {
                successSound.currentTime = 0;
                successSound.play().catch(() => {});
            }
        }

        function playErrorSound() {
            if (errorSound) {
                errorSound.currentTime = 0;
                errorSound.play().catch(() => {});
            }
        }

        async function stopScanner() {
            try {
                if (html5QrCode && scannerStarted) {
                    await html5QrCode.stop();
                    scannerStarted = false;
                }
            } catch (e) {
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                await stopScanner();
                setResult("Controllo ticket in corso...", "waiting");

                const selectedEvent =
                    document.getElementById("eventSelect").value;

                const selectedDate =
                    document.getElementById("dateSelect").value;

                const response = await fetch("/validate-ticket", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ticket_code: decodedText,
                        selected_event: selectedEvent,
                        selected_date: selectedDate
                    })
                });

                const isJson = response.headers.get("content-type")?.includes("application/json");
                const data = isJson ? await response.json() : null;

                if (!response.ok && (!data || !data.message)) {
                    playErrorSound();
                    setResult("❌ Errore durante la validazione", "error");
                    return;
                }

                if (data.status === "valid") {
                    playSuccessSound();
                    setResult(
                        "✅ TICKET VALIDO\n\n" +
                        "Codice: " + data.ticket.ticket_code + "\n" +
                        "Cliente: " + (data.ticket.customer || "-") + "\n" +
                        "Evento: " + data.ticket.event + "\n" +
                        "Validato alle: " + data.ticket.validated_at,
                        "success"
                    );
                } else if (data.status === "already_used") {
                    playErrorSound();
                    setResult(
                        "⚠️ TICKET GIÀ UTILIZZATO\n\n" +
                        "Codice: " + data.ticket.ticket_code + "\n" +
                        "Cliente: " + (data.ticket.customer || "-") + "\n" +
                        "Evento: " + data.ticket.event + "\n" +
                        "Già validato alle: " + (data.ticket.validated_at || "-"),
                        "warning"
                    );
                } else {
                    playErrorSound();
                    setResult(data.message || "❌ TICKET NON VALIDO", "error");
                }
            } catch (error) {
                playErrorSound();
                setResult("❌ Errore durante la validazione del ticket", "error");
            }
        }

        function onScanFailure(error) {
        }

        async function startScanner() {
            if (scannerStarted) return;

            unlockAudio();
            setResult("In attesa scansione...", "waiting");

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess,
                    onScanFailure
                );
                scannerStarted = true;
            } catch (err) {
                scannerStarted = false;
                setResult("❌ Impossibile avviare la fotocamera", "error");
            }
        }

        async function restartScanner() {
            isProcessing = false;
            await stopScanner();
            startScanner();
        }

        startBtn.addEventListener("click", startScanner);
        restartBtn.addEventListener("click", restartScanner);
    </script>
</body>
</html>
