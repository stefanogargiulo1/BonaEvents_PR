<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Utente</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:30px;
        }

        .card{
            max-width:700px;
            margin:auto;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
        }

        h1{
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:20px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
        }

        .readonly{
            opacity:.7;
        }

        .btn{
            margin-top:25px;
            background:#2563eb;
            color:white;
            border:none;
            padding:14px 20px;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
        }

        .back{
            display:inline-block;
            margin-bottom:20px;
            color:#93c5fd;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <a href="/admin/users" class="back">
        ← Torna agli utenti
    </a>

    <div class="card">

        <h1>
            ⚙️ Modifica Utente
        </h1>

        <label>ID</label>
        <input
            class="readonly"
            value="{{ user.id }}"
            readonly
        >

        <label>Username</label>
        <input
            class="readonly"
            value="{{ user.username }}"
            readonly
        >

        <label>Password</label>
        <input
            class="readonly"
            value="{{ user.password }}"
            readonly
        >

        <label>Ruolo</label>
        <input
            class="readonly"
            value="{{ user.role }}"
            readonly
        >

        <label>Stato</label>
        <input
            class="readonly"
            value="{{ user.status }}"
            readonly
        >

        <label>Team Leader</label>
        <input
            class="readonly"
            value="{{ user.team_leader_username or '-' }}"
            readonly
        >

        <label>Creato il</label>
        <input
            class="readonly"
            value="{{ user.created_at }}"
            readonly
        >

        <label>Approvato il</label>
        <input
            class="readonly"
            value="{{ user.approved_at or '-' }}"
            readonly
        >

    </div>

</body>
</html>
