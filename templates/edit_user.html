<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Utente</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:30px;
        }

        .card{
            max-width:700px;
            margin:auto;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
        }

        h1{
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:20px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
        }

        .readonly{
            opacity:.7;
        }

        .btn{
            margin-top:25px;
            background:#2563eb;
            color:white;
            border:none;
            padding:14px 20px;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
        }

        .back{
            display:inline-block;
            margin-bottom:20px;
            color:#93c5fd;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <a href="/admin/users" class="back">
        ← Torna agli utenti
    </a>

    <form method="POST">
    
    <div class="card">

        <h1>
            ⚙️ Modifica Utente
        </h1>

        <label>ID</label>
        <input
            class="readonly"
            value="{{ user.id }}"
            readonly
        >

        <label>Username</label>
        <input
            class="readonly"
            value="{{ user.username }}"
            readonly
        >

        <label>Password</label>
        <input
            type="text"
            name="password"
            value="{{ user.password }}"
        >

        <label>Ruolo</label>

        <select name="role">

            <option value="admin"
                {% if user.role == 'admin' %}selected{% endif %}>
                Admin
            </option>

            <option value="pr"
                {% if user.role == 'pr' %}selected{% endif %}>
                PR
            </option>

            <option value="team_leader"
                {% if user.role == 'team_leader' %}selected{% endif %}>
                Team Leader
            </option>

            <option value="scanner"
                {% if user.role == 'scanner' %}selected{% endif %}>
                Scanner
            </option>

        </select>

        <label>Stato</label>

        <select name="status">

            <option value="approved"
                {% if user.status == 'approved' %}selected{% endif %}>
                Approved
            </option>

            <option value="pending"
                {% if user.status == 'pending' %}selected{% endif %}>
                Pending
            </option>

            <option value="rejected"
                {% if user.status == 'rejected' %}selected{% endif %}>
                Rejected
            </option>

        </select>

        <label>Team Leader</label>

        <select name="team_leader_username">

            <option value="">
                Nessuno
            </option>

            {% for leader in team_leaders %}

                <option
                    value="{{ leader.username }}"
                    {% if user.team_leader_username == leader.username %}selected{% endif %}
                >
                    {{ leader.username }}
                </option>

            {% endfor %}

        </select>

        <label>Creato il</label>
        <input
            class="readonly"
            value="{{ user.created_at }}"
            readonly
        >

        <label>Approvato il</label>
        <input
            class="readonly"
            value="{{ user.approved_at or '-' }}"
            readonly
        >

        <button class="btn">
            💾 Salva Modifiche
        </button>


    </div>

    </form>

</body>
</html>
