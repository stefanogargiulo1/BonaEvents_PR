<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PR</title>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .login-box{
            background:#1a1a1a;
            padding:40px;
            border-radius:20px;
            width:350px;
            box-shadow:0px 0px 20px rgba(255,0,0,0.15);
            border:1px solid #222;
        }

        h1{
            color:#ff1e1e;
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#111;
            color:white;
            box-sizing:border-box;
            outline:none;
        }

        input:focus{
            border:1px solid #ff1e1e;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#ff1e1e;
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#cc0000;
            transform:translateY(-2px);
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#777;
            font-size:14px;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h1>BonaEvents PR 🔥</h1>

        <form method="POST">

            <input 
                type="text" 
                name="username"
                placeholder="Username"
                required
            >

            <input 
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                LOGIN
            </button>

        </form>

        <div class="footer">
            Powered by BonaEvents
        </div>

    </div>

</body>
</html>
