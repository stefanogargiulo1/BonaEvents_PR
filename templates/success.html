<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket creato</title>
    <style>
        body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
        .box{background:#1e293b;padding:30px;border-radius:18px;width:100%;max-width:560px;text-align:center}
        img{max-width:280px;background:#fff;padding:12px;border-radius:12px;margin:18px auto}
        .info{text-align:left;background:#0f172a;padding:16px;border-radius:12px}
        a{display:inline-block;margin-top:16px;padding:12px 16px;border-radius:10px;background:#2563eb;color:#fff;text-decoration:none;font-weight:bold}
    </style>
</head>
<body>
    <div class="box">
        <h1>Ticket creato con successo</h1>
        <p>Codice ticket: <strong>{{ ticket_code }}</strong></p>
        <img src="{{ url_for('static', filename=qr_image) }}" alt="QR Ticket">
        <div class="info">
            <p><strong>Evento:</strong> {{ event }}</p>
            <p><strong>Tariffa:</strong> {{ rate }}</p>
            <p><strong>Cliente:</strong> {{ customer }}</p>
            <p><strong>Email:</strong> {{ email or '-' }}</p>
            <p><strong>Telefono:</strong> {{ phone or '-' }}</p>
        </div>
        <a href="{{ url_for('dashboard') }}">Torna dashboard</a>
    </div>
</body>
</html>
