<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticket Creato</title>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .box{
            width:100%;
            max-width:550px;
            background:#1a1a1a;
            border-radius:20px;
            overflow:hidden;
            border:1px solid #2a2a2a;
            text-align:center;
        }

        .header{
            background:#ff1e1e;
            padding:30px;
        }

        .content{
            padding:40px;
        }

        .success{
            font-size:26px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .ticket-code{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:#ff1e1e;
        }

        .qr{
            margin-top:30px;
        }

        .qr img{
            width:220px;
            background:white;
            padding:10px;
            border-radius:14px;
        }

        .btn{
            display:inline-block;
            margin-top:35px;
            background:#ff1e1e;
            color:white;
            padding:16px 28px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }

        .btn:hover{
            opacity:0.9;
        }
        .whatsapp{
            background:#25D366;
        }

        .whatsapp:hover{
            background:#1ebe5d;
        }

        .download{
            background:#2563eb;
        }

        .download:hover{
            background:#1d4ed8;
        }

        .info{
            margin-top:25px;
            color:#999;
            line-height:26px;
        }

    </style>

</head>

<body>

    <div class="box">

        <div class="header">

            <h1>BonaEvents</h1>

        </div>

        <div class="content">

            <div class="success">
                Ticket creato correttamente 🎟️
            </div>

            <div class="info">

                Cliente:
                <b>{{ customer }}</b>

                <br><br>

                Evento:
                <b>{{ event }}</b>

            </div>

            <div class="ticket-code">

                {{ ticket_code }}

            </div>

            <div class="qr">

                <img src="{{ url_for('static', filename=qr_image) }}">

            </div>

            <a
                class="btn"
                href="{{ ticket_url }}"
                target="_blank"
            >
                VISUALIZZA TICKET
            </a>
            <br>

            <a
                class="btn whatsapp"
                target="_blank"
                href="https://wa.me/?text=🎫%20BonaEvents%0A%0AEvento:%20{{ event }}%0ACodice:%20{{ ticket_code }}%0A%0AVisualizza%20ticket:%0A{{ ticket_url }}"
            >
                📲 INVIA SU WHATSAPP
            </a>

            <br>

            <a
                class="btn download"
                href="{{ url_for('static', filename=qr_image) }}"
                download
            >
                📥 SCARICA QR
            </a>
        </div>

    </div>

</body>
</html>
