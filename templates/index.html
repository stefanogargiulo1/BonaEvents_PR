<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BonaEvents PR Panel</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#0f0f0f;
            color:white;
        }

        .navbar{
            background:#151515;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #222;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            color:#ff1e1e;
        }

        .container{
            padding:40px;
        }

        .welcome{
            background:#1a1a1a;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(255,0,0,0.15);
        }

        h1{
            margin-top:0;
            color:#ff1e1e;
        }

        .cards{
            margin-top:30px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:#1a1a1a;
            padding:25px;
            border-radius:20px;
            transition:0.2s;
            cursor:pointer;
            border:1px solid #222;
        }

        .card:hover{
            transform:translateY(-5px);
            border:1px solid #ff1e1e;
        }

        .card h2{
            margin:0;
            color:#ff1e1e;
        }

        .card p{
            color:#999;
        }

    </style>

</head>
<body>

    <div class="navbar">
        <div class="logo">
            BonaEvents PR 🔥
        </div>

        <div>
            Online
        </div>
    </div>

    <div class="container">

        <div class="welcome">
            <h1>Benvenuto nel pannello PR</h1>

            <p>
                Gestisci ticket, eventi e vendite direttamente dal tuo telefono.
            </p>
        </div>

        <div class="cards">

            <div class="card">
                <h2>🎟 Eventi</h2>
                <p>Visualizza gli eventi disponibili</p>
            </div>

            <div class="card">
                <h2>💰 Vendite</h2>
                <p>Controlla le tue vendite</p>
            </div>

            <div class="card">
                <h2>📊 Guadagni</h2>
                <p>Visualizza le commissioni</p>
            </div>

        </div>

    </div>

</body>
</html>
