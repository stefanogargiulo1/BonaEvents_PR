<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Ticket</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#111827;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            margin:0;
            padding:20px;
        }

        .box{
            background:#1f2937;
            padding:30px;
            border-radius:18px;
            width:100%;
            max-width:520px;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        h1{
            margin-top:0;
            margin-bottom:10px;
            font-size:42px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:20px;
        }

        input,
        select,
        button{
            width:100%;
            padding:14px;
            border-radius:10px;
            border:none;
            margin-top:12px;
            box-sizing:border-box;
            font-size:15px;
        }

        input,
        select{
            background:#f8fafc;
            color:#111827;
        }

        select{
            cursor:pointer;
        }

        button{
            background:#2563eb;
            color:#fff;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        a{
            color:#93c5fd;
            text-decoration:none;
        }

        .back{
            margin-top:18px;
        }
        
        .dates-grid,
        #ratesGrid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
            margin-top:10px;
        }

        .date-card,
        .rate-card{
            border:1px solid #475569;
            border-radius:12px;
            padding:15px;
            text-align:center;
            cursor:pointer;
            background:#0f172a;
        }

        .date-card:hover,
        .rate-card:hover{
            border-color:#3b82f6;
        }

        .date-card.active,
        .rate-card.active{
            background:#2563eb;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>{{ event_name }}</h1>

        <p>
            Inserisci i dati del cliente per generare il ticket.
        </p>

        <form method="POST" onsubmit="return validateForm()">

            <input
                type="hidden"
                name="rate"
                id="selectedRate"
                required
            >

            <h3>📅 Data Evento</h3>

            <div id="datesGrid" class="dates-grid">

            {% for date, rates in dates.items() %}

            <div
                class="date-card"
                onclick="selectDate(this,'{{ date }}')"
            >
                <strong>{{ date }}</strong>
            </div>

            {% endfor %}

            </div>

            <h3 style="margin-top:20px;">
                🎟️ Rate
            </h3>

            <div id="ratesGrid"></div>

            <input
                type="text"
                name="customer"
                placeholder="Nome cliente"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
            >

            <input
                type="text"
                name="phone"
                placeholder="Telefono"
            >

            <button type="submit">
                Genera ticket
            </button>

        </form>

        <p class="back">
            <a href="{{ url_for('dashboard') }}">
                Torna dashboard
            </a>
        </p>

    </div>

    <script>

    const datesData = {{ dates|tojson }};

    function selectDate(el,date){

        document
            .querySelectorAll(".date-card")
            .forEach(c=>c.classList.remove("active"));

        el.classList.add("active");

        const ratesGrid =
            document.getElementById("ratesGrid");

        ratesGrid.innerHTML = "";

        datesData[date].forEach(rate=>{

            ratesGrid.innerHTML += `
                <div
                    class="rate-card"
                    onclick="selectRate(this,'${rate.full_variant}')"
                >
                    <strong>${rate.rate}</strong>
                    <br>
                    €${rate.price}
                    <br>
                    ${rate.inventory} disponibili
                </div>
            `;

        });

    }

    function selectRate(el,variant){

        document
            .querySelectorAll(".rate-card")
            .forEach(c=>c.classList.remove("active"));

        el.classList.add("active");

        document.getElementById(
            "selectedRate"
        ).value = variant;

    }

    function validateForm(){

        if(
            !document.getElementById(
                "selectedRate"
            ).value
        ){
            alert(
                "Seleziona una data e una rate"
            );
            return false;
        }

        return true;

    }

    </script>

</body>
</html>
