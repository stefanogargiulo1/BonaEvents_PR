<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Ticket</title>
    <style>
        body{font-family:Arial,sans-serif;background:#111827;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
        .box{background:#1f2937;padding:30px;border-radius:18px;width:100%;max-width:520px}
        input,button{width:100%;padding:14px;border-radius:10px;border:none;margin-top:12px;box-sizing:border-box}
        input{background:#f8fafc}
        button{background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
        a{color:#93c5fd;text-decoration:none}
    </style>
</head>
<body>
    <div class="box">
        <h1>{{ event_name }}</h1>
        <p>Inserisci i dati del cliente per generare il ticket.</p>
        <form method="POST">
            <input type="text" name="rate" placeholder="Tariffa" required>
            <input type="text" name="customer" placeholder="Nome cliente" required>
            <input type="email" name="email" placeholder="Email">
            <input type="text" name="phone" placeholder="Telefono">
            <button type="submit">Genera ticket</button>
        </form>
        <p style="margin-top:16px"><a href="{{ url_for('dashboard') }}">Torna dashboard</a></p>
    </div>
</body>
</html>
