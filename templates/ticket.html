<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Ticket</title>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            font-family:Arial;
            color:white;
        }

        .container{
            max-width:500px;
            margin:auto;
            padding:40px;
        }

        .box{
            background:#1a1a1a;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(255,0,0,0.15);
            border:1px solid #222;
        }

        h1{
            color:#ff1e1e;
            margin-top:0;
        }

        p{
            color:#999;
            margin-bottom:25px;
        }

        input, select{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#111;
            color:white;
            box-sizing:border-box;
            outline:none;
        }

        input:focus,
        select:focus{
            border:1px solid #ff1e1e;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#ff1e1e;
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#cc0000;
            transform:translateY(-2px);
        }

        .back{
            display:inline-block;
            margin-bottom:20px;
            color:#999;
            text-decoration:none;
        }

        .back:hover{
            color:#ff1e1e;
        }

    </style>

</head>
<body>

    <div class="container">

        <a class="back" href="/dashboard">
            ← Torna agli eventi
        </a>

        <div class="box">

            <h1>{{ event_name }}</h1>

            <p>
                Compila i dati del cliente per creare il ticket.
            </p>

            <form method="POST">

                <select name="rate">

                    <option>Female First Rate</option>
                    <option>Female Second Rate</option>
                    <option>Male First Rate</option>
                    <option>Male Second Rate</option>

                </select>

                <input 
                    type="text"
                    name="customer"
                    placeholder="Nome Cliente"
                    required
                >

                <input 
                    type="email"
                    name="email"
                    placeholder="Email Cliente"
                    required
                >

                <input 
                    type="text"
                    name="phone"
                    placeholder="Telefono Cliente"
                    required
                >

                <button type="submit">
                    CREA TICKET
                </button>

            </form>

        </div>

    </div>

</body>
</html>
